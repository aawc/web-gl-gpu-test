<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL vs WebGPU</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        canvas { border: 1px solid black; margin-top: 10px; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>WebGL vs WebGPU Minimal PoCs</h1>
    <div class="controls">
        <button onclick="runWebGL()">Run WebGL</button>
        <button onclick="runWebGPU()">Run WebGPU</button>
    </div>
    <div>
        <span id="status">Select a PoC to run</span>
    </div>
    <canvas id="gfxCanvas" width="400" height="300"></canvas>

    <script>
        const canvas = document.getElementById('gfxCanvas');
        const statusDiv = document.getElementById('status');

        function runWebGL() {
            statusDiv.textContent = "Running WebGL...";
            const gl = canvas.getContext('webgl');
            if (!gl) {
                statusDiv.textContent = "WebGL not supported";
                return;
            }

            // Minimal Vertex Shader
            const vsSource = `
                void main() {
                    gl_Position = vec4(0.0, 0.0, 0.0, 1.0);
                    gl_PointSize = 100.0;
                }
            `;

            // Minimal Fragment Shader
            const fsSource = `
                void main() {
                    gl_FragColor = vec4(0.0, 0.0, 1.0, 1.0); // Blue point
                }
            `;

            // 1. WebGLRenderingContext.compileShader() PoC
            const vs = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vs, vsSource);
            gl.compileShader(vs);
            if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) {
                statusDiv.textContent = "VS compile failed: " + gl.getShaderInfoLog(vs);
                return;
            }

            const fs = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fs, fsSource);
            gl.compileShader(fs);
            if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
                statusDiv.textContent = "FS compile failed: " + gl.getShaderInfoLog(fs);
                return;
            }

            // 2. WebGLRenderingContext.linkProgram() PoC
            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                statusDiv.textContent = "Program link failed: " + gl.getProgramInfoLog(program);
                return;
            }

            gl.useProgram(program);

            // Clear background to Red, then draw our Blue point
            gl.clearColor(1.0, 0.0, 0.0, 1.0); // Red background
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArrays(gl.POINTS, 0, 1);

            statusDiv.textContent = "WebGL: compileShader() & linkProgram() Success! (Red bg + Blue square)";
        }

        async function runWebGPU() {
            statusDiv.textContent = "Running WebGPU...";
            if (!navigator.gpu) {
                statusDiv.textContent = "WebGPU not supported in this browser.";
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                statusDiv.textContent = "Failed to get WebGPU adapter.";
                return;
            }

            // 3. GPUAdapter.requestDevice() PoC
            const device = await adapter.requestDevice();
            if (!device) {
                statusDiv.textContent = "Failed GPUAdapter.requestDevice()";
                return;
            }

            const context = canvas.getContext('webgpu');
            const format = navigator.gpu.getPreferredCanvasFormat();

            context.configure({
                device: device,
                format: format,
                alphaMode: 'opaque'
            });

            const commandEncoder = device.createCommandEncoder();
            const renderPassDescriptor = {
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    clearValue: { r: 0.0, g: 1.0, b: 0.0, a: 1.0 }, // Green
                    loadOp: 'clear',
                    storeOp: 'store'
                }]
            };

            const passEncoder = commandEncoder.beginRenderPass(renderPassDescriptor);
            passEncoder.end();
            device.queue.submit([commandEncoder.finish()]);

            statusDiv.textContent = "WebGPU: GPUAdapter.requestDevice() Success! (Green background)";
        }
    </script>
</body>
</html>
